<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking Nexus | Nikki Cates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #050A18; --teal: #58BBC2; --gold: #D4AF37; }
        body { font-family: 'Inter', sans-serif; background-color: var(--navy); color: white; margin: 0; }
        .serif { font-family: 'Playfair Display', serif; }
        .nexus-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 1.5rem; border-radius: 1.25rem; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s; width: 100%; text-align: left; }
        .nexus-btn:hover { background: rgba(88, 187, 194, 0.1); border-color: var(--teal); transform: translateY(-2px); }
        .st-logo { width: 50px; height: 50px; border: 2px solid var(--gold); display: flex; items-center: center; justify-content: center; font-weight: 900; color: var(--gold); border-radius: 10px; font-size: 20px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 overflow-hidden">

    <div class="max-w-md w-full text-center space-y-8">
        <header class="mb-12">
            <div class="st-logo mx-auto mb-6">ST</div>
            <h1 class="text-4xl font-bold mb-2">Nikki Cates</h1>
            <p class="text-xs font-bold uppercase tracking-[0.4em] text-gold">Principal Architect</p>
            <p class="text-sm text-slate-500 mt-4 italic serif">"Redesigning leadership architecture for the AI era."</p>
        </header>

        <div class="space-y-4">
            <!-- CTA 1: THE BRIEFING -->
            <a href="briefing.html" class="nexus-btn group">
                <div>
                    <h3 class="font-bold text-teal-400 uppercase text-[10px] tracking-widest mb-1">Lead Intervention</h3>
                    <p class="text-lg font-bold">Executive Briefing</p>
                </div>
                <span class="text-teal-500 group-hover:translate-x-1 transition-transform">→</span>
            </a>

            <!-- CTA 2: SPEAKING -->
            <a href="https://nikkicates.github.io/structural-speaker-pages/" target="_blank" class="nexus-btn group">
                <div>
                    <h3 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest mb-1">Keynotes & Stages</h3>
                    <p class="text-lg font-bold">Speaker Portfolio</p>
                </div>
                <span class="text-slate-500 group-hover:translate-x-1 transition-transform">→</span>
            </a>

            <!-- CTA 3: NEWSLETTER -->
            <a href="https://www.linkedin.com" target="_blank" class="nexus-btn group">
                <div>
                    <h3 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest mb-1">Weekly Metrics</h3>
                    <p class="text-lg font-bold text-balance">The UNMASK Report</p>
                </div>
                <span class="text-slate-500 group-hover:translate-x-1 transition-transform">→</span>
            </a>

            <!-- CTA 4: INVESTOR HUB -->
            <a href="index.html" class="nexus-btn group border-gold/30">
                <div>
                    <h3 class="font-bold text-gold uppercase text-[10px] tracking-widest mb-1">Architecture</h3>
                    <p class="text-lg font-bold">Investor Relations Hub</p>
                </div>
                <span class="text-gold group-hover:translate-x-1 transition-transform">→</span>
            </a>
        </div>

        <footer class="mt-16 pt-8 border-t border-white/5">
            <p class="text-[9px] uppercase font-bold tracking-[0.5em] text-slate-600">Strategic Transformations — 2026</p>
        </footer>
    </div>

</body>
</html>
